name: Build And Push Images to GitHub
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login To GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build HW1 and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hw1.Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/sd-train-hw1:${{ github.ref_name }}
          push: true

      - name: Build HW2 and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hw2.Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/sd-train-hw2:${{ github.ref_name }}
          push: true
